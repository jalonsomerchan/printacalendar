name: Build site into repository root

on:
  push:
    branches: [main]
    paths-ignore:
      - 'assets/**'
      - 'index.html'
      - 'favicon.svg'
      - 'CNAME'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-root
  cancel-in-progress: false

jobs:
  build-root:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Copy build to repository root
        run: |
          rm -rf assets
          cp -R dist/. .
          test -f CNAME || printf 'printacalendar.alon.one\n' > CNAME

      - name: Commit built site
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Build static site for GitHub Pages'
          file_pattern: 'index.html assets/** favicon.svg CNAME'
